version: "3.8"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16 + PostGIS 3.4
  # Aurora Serverless v2 compatible
  # ─────────────────────────────────────────────
  postgis:
    image: postgis/postgis:16-3.4
    container_name: infra-postgis
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
      - ./services/postgis/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-directus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      POSTGRES_DB: ${POSTGRES_DB:-directus}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-directus} -d ${POSTGRES_DB:-directus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - areadev-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Microsoft SQL Server 2019
  # Legacy data source for ETL pipeline
  # ─────────────────────────────────────────────
  mssql:
    build:
      context: ./services/mssql
    container_name: infra-mssql
    user: root
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql/data
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrongPassword123}
      MSSQL_PID: Developer
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${MSSQL_SA_PASSWORD:-YourStrongPassword123} -C -Q 'SELECT 1' -b"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - areadev-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Redis 7 — Cache for Directus CMS
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: infra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - areadev-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # LocalStack — AWS service emulation (S3, SQS)
  # ─────────────────────────────────────────────
  localstack:
    image: localstack/localstack:latest
    container_name: infra-localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./services/localstack/init:/etc/localstack/init/ready.d
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      EDGE_PORT: 4566
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep -q '\"s3\": \"running\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - areadev-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # ETL Cron — node-cron scheduler for sync jobs
  # ─────────────────────────────────────────────
  etl-cron:
    build:
      context: ./services/etl-cron
    container_name: infra-etl-cron
    environment:
      SYNC_CRON_SCHEDULE: ${SYNC_CRON_SCHEDULE:-0 */6 * * *}
      API_TOKEN: ${ETL_API_TOKEN:-}
      DEFAULT_DIRECTUS_USER: ${DEFAULT_DIRECTUS_USER:-}
      DB_HOST: infra-postgis
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-directus}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      DB_NAME: ${POSTGRES_DB:-directus}
      MSSQL_HOST: infra-mssql
      MSSQL_PORT: "1433"
      MSSQL_USER: sa
      MSSQL_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrongPassword123}
    depends_on:
      postgis:
        condition: service_healthy
      mssql:
        condition: service_healthy
    networks:
      - areadev-net
    restart: unless-stopped

volumes:
  postgis-data:
    name: infra-postgis-data
  mssql-data:
    name: infra-mssql-data
  redis-data:
    name: infra-redis-data
  localstack-data:
    name: infra-localstack-data

networks:
  areadev-net:
    name: areadev-net
    driver: bridge
